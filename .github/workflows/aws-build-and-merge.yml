# AWS Build & Deploy to Staging
#
# Flow:
#   1. Add the "deploy-to-staging" label to a PR targeting main
#      (subsequent pushes auto-retrigger while the label is present)
#   2. Source is uploaded to S3, CodeBuild Test runs (lint + unit tests)
#   3. CodeBuild Deploy runs (Docker → ECR → Lambda, frontend → S3)
#   4. Success → PR comment confirming staging deploy
#   5. Manual approval via GitHub "staging" environment gate
#   6. Approved → auto-merge (squash)
#      Failure → PR comment with build failure details
#
# Setup (one-time):
#   In GitHub repo Settings → Secrets and variables → Actions:
#     - AWS_DEPLOY_ROLE_ARN  = (terraform output github_actions_role_arn)
#     - AWS_ARTIFACTS_BUCKET = (terraform output artifacts_bucket)
#   Create a "deploy-to-staging" label in the repo (Settings → Labels).
#
# Also supports manual trigger via workflow_dispatch (deploys current main).

name: AWS Build & Deploy

on:
  pull_request:
    types: [labeled, synchronize]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: aws-deploy-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ── AWS CodeBuild: Test + Deploy ────────────────────────────────────
  aws-build-deploy:
    name: AWS Build & Deploy to Staging
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.base.ref == 'main' &&
       (github.event.action == 'labeled' && github.event.label.name == 'deploy-to-staging' ||
        github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'deploy-to-staging')))
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      id-token: write        # OIDC authentication to AWS
      contents: read
      pull-requests: write   # Post PR comments
    env:
      AWS_REGION: eu-west-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload source to S3
        env:
          BUCKET: ${{ secrets.AWS_ARTIFACTS_BUCKET }}
          BUILD_KEY: ${{ github.event.pull_request.number || github.sha }}
        run: |
          zip -r /tmp/source.zip . -x '.git/*'
          aws s3 cp /tmp/source.zip "s3://${BUCKET}/github-actions/${BUILD_KEY}/source.zip"

      # ── Test stage ──────────────────────────────────────────────────
      - name: Start CodeBuild — Test
        id: test
        env:
          BUCKET: ${{ secrets.AWS_ARTIFACTS_BUCKET }}
          BUILD_KEY: ${{ github.event.pull_request.number || github.sha }}
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name antenna-simulator-test-staging \
            --source-type-override S3 \
            --source-location-override "${BUCKET}/github-actions/${BUILD_KEY}/source.zip" \
            --buildspec-override buildspec-test.yml \
            --query 'build.id' --output text)
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::CodeBuild Test started: $BUILD_ID"

      - name: Wait for Test build
        timeout-minutes: 15
        env:
          BUILD_ID: ${{ steps.test.outputs.build_id }}
        run: |
          echo "Polling build ${BUILD_ID}..."
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' --output text)
            case "$STATUS" in
              SUCCEEDED)
                echo "✅ Test build passed"
                exit 0
                ;;
              IN_PROGRESS)
                sleep 15
                ;;
              *)
                LOG_URL=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
                  --query 'builds[0].logs.deepLink' --output text)
                echo "::error::Test build ${STATUS}. Logs: ${LOG_URL}"
                exit 1
                ;;
            esac
          done

      # ── Deploy stage ────────────────────────────────────────────────
      - name: Start CodeBuild — Deploy
        id: deploy
        env:
          BUCKET: ${{ secrets.AWS_ARTIFACTS_BUCKET }}
          BUILD_KEY: ${{ github.event.pull_request.number || github.sha }}
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name antenna-simulator-deploy-staging \
            --source-type-override S3 \
            --source-location-override "${BUCKET}/github-actions/${BUILD_KEY}/source.zip" \
            --buildspec-override buildspec-deploy.yml \
            --query 'build.id' --output text)
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::CodeBuild Deploy started: $BUILD_ID"

      - name: Wait for Deploy build
        timeout-minutes: 35
        env:
          BUILD_ID: ${{ steps.deploy.outputs.build_id }}
        run: |
          echo "Polling build ${BUILD_ID}..."
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' --output text)
            case "$STATUS" in
              SUCCEEDED)
                echo "✅ Deploy build passed"
                exit 0
                ;;
              IN_PROGRESS)
                sleep 15
                ;;
              *)
                LOG_URL=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
                  --query 'builds[0].logs.deepLink' --output text)
                echo "::error::Deploy build ${STATUS}. Logs: ${LOG_URL}"
                exit 1
                ;;
            esac
          done

      # ── Report result (PR only) ────────────────────────────────────
      - name: Comment — staging deployed
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body \
            "✅ **AWS Build & Deploy succeeded**

          Staging has been updated at https://antennaeducator.nyakyagyawa.com"

      - name: Comment — build failed
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body \
            "❌ **AWS Build & Deploy failed**

          Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details. Remove and re-add the \`deploy-to-staging\` label to retry."

      # ── Cleanup ─────────────────────────────────────────────────────
      - name: Clean up S3 source
        if: always()
        env:
          BUCKET: ${{ secrets.AWS_ARTIFACTS_BUCKET }}
          BUILD_KEY: ${{ github.event.pull_request.number || github.sha }}
        run: |
          aws s3 rm "s3://${BUCKET}/github-actions/${BUILD_KEY}/" --recursive || true

  # ── Manual approval gate — test staging before merge ──────────────
  verify-staging:
    name: Verify Staging
    needs: aws-build-deploy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: staging          # Requires approval in GitHub Environment settings
    steps:
      - name: Staging approved
        run: echo "✅ Staging verified — proceeding to merge."

  # ── Auto-merge after approval ───────────────────────────────────
  auto-merge:
    name: Auto-merge PR
    needs: verify-staging
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash --auto
          echo "✅ Auto-merge enabled — PR will merge once all required checks pass."
