services:
  # Frontend - React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api-gateway
    networks:
      - antenna-network
    restart: unless-stopped

  # API Gateway - Nginx reverse proxy
  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - preprocessor
      - solver
      - postprocessor
      - projects
    networks:
      - antenna-network
    restart: unless-stopped

  # Preprocessor Service
  preprocessor:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.preprocessor.main:app --host 0.0.0.0 --port 8001
    expose:
      - "8001"
    environment:
      - SERVICE_NAME=preprocessor
    networks:
      - antenna-network
    restart: unless-stopped

  # Solver Service
  solver:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.solver.main:app --host 0.0.0.0 --port 8002
    expose:
      - "8002"
    environment:
      - SERVICE_NAME=solver
    networks:
      - antenna-network
    restart: unless-stopped
    # Increase memory for solver
    deploy:
      resources:
        limits:
          memory: 4G

  # Postprocessor Service
  postprocessor:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.postprocessor.main:app --host 0.0.0.0 --port 8003
    expose:
      - "8003"
    environment:
      - SERVICE_NAME=postprocessor
    networks:
      - antenna-network
    restart: unless-stopped

  # Auth Service - Authentication and user management
  auth:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.auth.main:app --host 0.0.0.0 --port 8011
    ports:
      - "8011:8011"
    environment:
      - JWT_SECRET_KEY=your-secret-key-change-in-production-use-openssl-rand-hex-32
      # Database: DynamoDB Local (same as AWS production)
      - USE_DYNAMODB=true
      - DYNAMODB_ENDPOINT_URL=http://dynamodb-local:8000
      - DYNAMODB_TABLE_NAME=antenna-simulator-local
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_DEFAULT_REGION=eu-west-1
      # Authentication: JWT (not Cognito) with auto-approval
      - USE_COGNITO=false  # Docker mode: local JWT with auto-approval
      # Note: First registered user becomes admin automatically
      # All users are auto-approved in Docker mode
    depends_on:
      - dynamodb-local
    networks:
      - antenna-network
    restart: unless-stopped

  # Projects Service - Project management and persistence
  projects:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.projects.main:app --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"
    environment:
      - JWT_SECRET_KEY=your-secret-key-change-in-production-use-openssl-rand-hex-32
      # Database: DynamoDB Local (same as AWS production)
      - USE_DYNAMODB=true
      - DYNAMODB_ENDPOINT_URL=http://dynamodb-local:8000
      - DYNAMODB_TABLE_NAME=antenna-simulator-local
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=eu-west-1
      # S3-compatible storage: MinIO for Docker
      - USE_S3=true
      - S3_ENDPOINT_URL=http://minio:9000
      - RESULTS_BUCKET_NAME=antenna-simulator-results-local
      # Authentication: JWT (not Cognito) with auto-approval
      - USE_COGNITO=false  # Docker mode: local JWT with auto-approval
      # Note: First registered user becomes admin automatically
      # All users are auto-approved in Docker mode
    depends_on:
      - dynamodb-local
      - minio
    networks:
      - antenna-network
    restart: unless-stopped

  # MinIO - S3-compatible object storage for simulation results
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"  # MinIO Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - antenna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DynamoDB Local - NoSQL database for testing
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    networks:
      - antenna-network
    restart: unless-stopped

networks:
  antenna-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
