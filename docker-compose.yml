# =============================================================================
# Antenna Educator — Docker Compose (standalone / on-prem mode)
#
# Quick start:
#   1. cp .env.example .env   (edit ADMIN_EMAIL, ADMIN_PASSWORD, JWT_SECRET_KEY)
#   2. docker compose up -d
#   3. scripts/init-local.ps1  (Windows) or ./scripts/init-local.sh
#   4. Open http://localhost:5173
#
# Optional monitoring profile (Prometheus + Grafana):
#   docker compose --profile monitoring up -d
#
# Environment variables are read from the .env file in the repo root.
# =============================================================================

# --------------------------------------------------------------------------
# Shared environment anchor — backend services all need these settings.
# Override per-service below only when a service has a unique requirement.
# --------------------------------------------------------------------------
x-backend-env: &backend-env
  USE_COGNITO: "false"
  USE_DYNAMODB: "true"
  DYNAMODB_ENDPOINT_URL: "http://dynamodb-local:8000"
  DYNAMODB_TABLE_NAME: "${DYNAMODB_TABLE_NAME:-antenna-simulator-local}"
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-dummy}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-dummy}"
  AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-eu-west-1}"
  JWT_SECRET_KEY: "${JWT_SECRET_KEY}"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  # DynamoDB Local — NoSQL database (data persisted to named volume)
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    # Run as root so the named volume (/data owned by root) is writable.
    # This is acceptable for local development — DynamoDB Local is not exposed externally.
    user: root
    command: "-jar DynamoDBLocal.jar -dbPath /data -sharedDb"
    ports:
      - "${DYNAMODB_LOCAL_PORT:-8888}:8000"   # host:8888 avoids collision with api-gateway:8000
    volumes:
      - dynamodb-data:/data
    networks:
      - antenna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8000 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # MinIO — S3-compatible object storage for simulation results
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console — http://localhost:9001
    environment:
      MINIO_ROOT_USER: "${AWS_ACCESS_KEY_ID:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY:-minioadmin}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - antenna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ── Backend microservices ─────────────────────────────────────────────────

  preprocessor:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.preprocessor.main:app --host 0.0.0.0 --port 8001
    expose:
      - "8001"
    environment:
      <<: *backend-env
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - antenna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 4

  solver:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.solver.main:app --host 0.0.0.0 --port 8002
    expose:
      - "8002"
    environment:
      <<: *backend-env
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - antenna-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 4

  postprocessor:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.postprocessor.main:app --host 0.0.0.0 --port 8003
    expose:
      - "8003"
    environment:
      <<: *backend-env
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - antenna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 4

  projects:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.projects.main:app --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"
    environment:
      <<: *backend-env
      # S3-compatible storage via MinIO
      USE_S3: "true"
      S3_ENDPOINT_URL: "http://minio:9000"
      RESULTS_BUCKET_NAME: "${RESULTS_BUCKET_NAME:-antenna-simulator-results-local}"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - antenna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 15s
      timeout: 5s
      retries: 4

  # auth service (standalone auth endpoints — used in Docker/on-prem mode)
  auth:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: uvicorn backend.auth.main:app --host 0.0.0.0 --port 8011
    ports:
      - "8011:8011"
    environment:
      <<: *backend-env
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - antenna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 15s
      timeout: 5s
      retries: 4

  # ── API Gateway ───────────────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      preprocessor:
        condition: service_healthy
      solver:
        condition: service_healthy
      postprocessor:
        condition: service_healthy
      projects:
        condition: service_healthy
    networks:
      - antenna-network
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - antenna-network
    restart: unless-stopped

  # ── Optional monitoring profile ───────────────────────────────────────────
  # Start with:  docker compose --profile monitoring up -d

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - antenna-network
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    ports:
      - "3001:3000"   # Grafana UI — http://localhost:3001
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - antenna-network
    restart: unless-stopped

# --------------------------------------------------------------------------
# Networks
# --------------------------------------------------------------------------
networks:
  antenna-network:
    driver: bridge

# --------------------------------------------------------------------------
# Volumes — all data persists across container restarts
# --------------------------------------------------------------------------
volumes:
  dynamodb-data:
    driver: local
  minio-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
