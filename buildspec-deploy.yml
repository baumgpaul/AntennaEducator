# CodeBuild buildspec — Deploy stage
# Builds Docker images, pushes to ECR, updates Lambda functions,
# deploys frontend to S3, and runs a smoke test.
# Used by the CodePipeline Deploy stage.
#
# Environment variables (set by Terraform via CodeBuild project):
#   AWS_ACCOUNT_ID, AWS_DEFAULT_REGION, ENVIRONMENT,
#   S3_FRONTEND_BUCKET, CLOUDFRONT_DISTRIBUTION_ID

version: 0.2

env:
  variables:
    SERVICES: "preprocessor solver postprocessor projects"

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION |
        docker login --username AWS --password-stdin
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo "Installing smoke-test dependencies..."
      - pip install requests

  build:
    commands:
      # ── Build & push Lambda container images ──
      - echo "=== Building Lambda container images ==="
      - |
        for SERVICE in $SERVICES; do
          REPO="antenna-simulator-${SERVICE}-${ENVIRONMENT}"
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/${REPO}:latest"

          echo "--- Building ${SERVICE} ---"
          docker build \
            -f backend/${SERVICE}/Dockerfile.lambda \
            -t ${REPO}:latest \
            --platform linux/amd64 .

          docker tag ${REPO}:latest $IMAGE_URI
          docker push $IMAGE_URI

          echo "Updating Lambda function ${REPO}..."
          aws lambda update-function-code \
            --function-name "${REPO}" \
            --image-uri "$IMAGE_URI" \
            --region "$AWS_DEFAULT_REGION"

          echo "Waiting for ${SERVICE} Lambda to be ready..."
          aws lambda wait function-updated \
            --function-name "${REPO}" \
            --region "$AWS_DEFAULT_REGION"

          echo "${SERVICE} deployed successfully."
        done

      # ── Build & deploy frontend ──
      - echo "=== Building frontend ==="
      - cd frontend && npm ci && NODE_OPTIONS="--max-old-space-size=4096" npm run build && cd ..

      - echo "=== Deploying frontend to S3 ==="
      - aws s3 sync frontend/dist/ s3://$S3_FRONTEND_BUCKET/ --delete

      - echo "=== Invalidating CloudFront cache ==="
      - aws cloudfront create-invalidation
          --distribution-id $CLOUDFRONT_DISTRIBUTION_ID
          --paths "/*"

  post_build:
    commands:
      - echo "=== Running smoke tests ==="
      - cd $CODEBUILD_SRC_DIR && python dev_tools/test_aws_pipeline.py
      - echo "Deployment complete!"
